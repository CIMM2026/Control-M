name: Control-M Helix Deployment

# El proceso se dispara cada vez que haces un "push" (subes cambios)
on:
  push:
    branches:
      - main

jobs:
  deploy-to-helix:
    runs-on: ubuntu-latest

    steps:
      # 1. El robot de GitHub descarga tus archivos JSON
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Instala Node.js (necesario para el CLI)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Instala el CLI de Control-M Automation API
      - name: Install Control-M CLI
        run: npm install -g ctm-automation-api

      # 4. Configura el entorno y hace el Deploy
      - name: Deploy Jobs to Helix
        run: |
          ctm env add demo "${{ secrets.CTM_URL }}" "${{ secrets.CTM_TOKEN }}"
          ctm env set demo
          ctm deploy *.json
